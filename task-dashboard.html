<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务完成可视化面板</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222635;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-secondary: #8b8fa8;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.3);
    --danger: #ef4444;
    --success: #22c55e;
    --warning: #f59e0b;
    --radius: 16px;
    --radius-sm: 10px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* 背景装饰 */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(34,197,94,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(245,158,11,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ===== 头部 ===== */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e1e4ed 0%, #a5a9c0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-top: 6px;
  }

  /* ===== 统计栏 ===== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 36px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px;
    text-align: center;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }
  .stat-card:hover {
    border-color: #3a3d50;
    transform: translateY(-2px);
  }
  .stat-card .stat-icon {
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  .stat-card .stat-value {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .stat-card .stat-label {
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-top: 2px;
  }
  .stat-card.total .stat-value { color: #818cf8; }
  .stat-card.done .stat-value { color: #4ade80; }
  .stat-card.avg .stat-value { color: #fbbf24; }

  /* 光晕装饰 */
  .stat-card::after {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 80px; height: 80px;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.15;
    pointer-events: none;
  }
  .stat-card.total::after { background: #818cf8; }
  .stat-card.done::after { background: #4ade80; }
  .stat-card.avg::after { background: #fbbf24; }

  /* ===== 操作栏 ===== */
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .btn-primary:hover {
    background: #7577f5;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(99,102,241,0.4);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover {
    background: var(--surface-hover);
    color: var(--text);
  }

  /* ===== 任务列表 ===== */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }
  .task-card:hover {
    border-color: #3a3d50;
    transform: translateX(2px);
  }
  .task-card.completed {
    border-color: rgba(34,197,94,0.25);
    background: linear-gradient(135deg, rgba(34,197,94,0.04) 0%, var(--surface) 30%);
  }
  .task-card.completed::before {
    content: '✓';
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2rem;
    color: rgba(34,197,94,0.12);
    pointer-events: none;
  }

  .task-info {
    flex: 1;
    min-width: 0;
  }
  .task-name {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .task-card.completed .task-name {
    text-decoration: line-through;
    color: var(--text-secondary);
  }
  .task-meta {
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  /* 状态徽章 */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge-not-started { background: rgba(139,143,168,0.12); color: #8b8fa8; }
  .badge-in-progress { background: rgba(99,102,241,0.12); color: #818cf8; }
  .badge-done { background: rgba(34,197,94,0.12); color: #4ade80; }

  /* 进度条区域 */
  .progress-section {
    width: 200px;
    flex-shrink: 0;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .progress-percent {
    font-weight: 700;
    font-size: 0.9rem;
    font-variant-numeric: tabular-nums;
  }
  .progress-bar-track {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .progress-bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 100%);
    border-radius: 10px 10px 0 0;
  }

  /* 进度条颜色 */
  .progress-low .progress-bar-fill { background: linear-gradient(90deg, #ef4444, #f59e0b); }
  .progress-mid .progress-bar-fill { background: linear-gradient(90deg, #f59e0b, #6366f1); }
  .progress-high .progress-bar-fill { background: linear-gradient(90deg, #6366f1, #22c55e); }
  .progress-done .progress-bar-fill { background: #22c55e; }

  /* 操作按钮 */
  .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    font-size: 1rem;
  }
  .btn-icon:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: #4a4d60;
  }
  .btn-icon.danger:hover {
    background: rgba(239,68,68,0.1);
    color: var(--danger);
    border-color: rgba(239,68,68,0.3);
  }

  /* ===== 弹窗 ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 90%;
    max-width: 440px;
    animation: slideUp 0.3s ease;
  }
  .modal h2 {
    font-size: 1.2rem;
    margin-bottom: 20px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-group input[type="text"],
  .form-group input[type="range"] {
    width: 100%;
  }
  .form-group input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    transition: var(--transition);
  }
  .form-group input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .range-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .range-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
  }
  .range-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 4px var(--accent-glow);
    transition: var(--transition);
  }
  .range-row .range-value {
    font-weight: 700;
    font-size: 1.1rem;
    min-width: 44px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }
  .btn-cancel {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-cancel:hover { background: var(--surface-hover); }

  /* ===== 空状态 ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-state .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  .empty-state p {
    font-size: 0.95rem;
    margin-bottom: 20px;
  }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 20px;
    font-size: 0.85rem;
    animation: slideIn 0.3s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast.removing { animation: slideOut 0.3s ease forwards; }
  @keyframes slideOut { to { transform: translateX(100%); opacity: 0; } }

  /* ===== 响应式 ===== */
  @media (max-width: 640px) {
    .container { padding: 20px 14px 60px; }
    .header h1 { font-size: 1.5rem; }
    .header { margin-bottom: 28px; }
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-card { padding: 16px 12px; }
    .stat-card .stat-value { font-size: 1.3rem; }
    .task-card {
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
      padding: 16px 18px;
    }
    .progress-section { width: 100%; }
    .task-actions { justify-content: flex-end; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- 头部 -->
  <header class="header">
    <h1>📋 任务完成可视化面板</h1>
    <p class="subtitle">追踪每个任务的进展，一目了然</p>
  </header>

  <!-- 统计栏 -->
  <div class="stats-row">
    <div class="stat-card total">
      <div class="stat-icon">📊</div>
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-label">总任务数</div>
    </div>
    <div class="stat-card done">
      <div class="stat-icon">✅</div>
      <div class="stat-value" id="statDone">0</div>
      <div class="stat-label">已完成</div>
    </div>
    <div class="stat-card avg">
      <div class="stat-icon">📈</div>
      <div class="stat-value" id="statAvg">0%</div>
      <div class="stat-label">平均进度</div>
    </div>
  </div>

  <!-- 操作栏 -->
  <div class="actions">
    <span style="color:var(--text-secondary);font-size:0.85rem;" id="taskCount">共 0 个任务</span>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 新增任务</button>
  </div>

  <!-- 任务列表 -->
  <div class="task-list" id="taskList"></div>

  <!-- 空状态 -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">📝</div>
    <p>还没有任何任务</p>
    <button class="btn btn-primary" onclick="openAddModal()">创建第一个任务</button>
  </div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">新增任务</h2>
    <div class="form-group">
      <label>任务名称</label>
      <input type="text" id="modalTaskName" placeholder="输入任务名称..." maxlength="60">
    </div>
    <div class="form-group">
      <label>完成进度</label>
      <div class="range-row">
        <input type="range" id="modalTaskProgress" min="0" max="100" value="0" oninput="updateRangeValue()">
        <span class="range-value" id="rangeValueDisplay">0%</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===== 数据管理 =====
const STORAGE_KEY = 'task-dashboard-tasks';
let tasks = [];
let editingId = null;

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    tasks = raw ? JSON.parse(raw) : getDefaultTasks();
  } catch {
    tasks = getDefaultTasks();
  }
}

function getDefaultTasks() {
  return [
    { id: genId(), name: '需求分析与方案设计', progress: 100, createdAt: Date.now() - 600000 },
    { id: genId(), name: '前端页面开发', progress: 75, createdAt: Date.now() - 500000 },
    { id: genId(), name: '后端 API 对接', progress: 45, createdAt: Date.now() - 400000 },
    { id: genId(), name: '单元测试编写', progress: 20, createdAt: Date.now() - 300000 },
    { id: genId(), name: '部署上线与监控', progress: 0, createdAt: Date.now() - 200000 },
  ];
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function genId() {
  return 't_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
}

// ===== 渲染 =====
function getProgressClass(progress) {
  if (progress >= 100) return 'progress-done';
  if (progress >= 66) return 'progress-high';
  if (progress >= 33) return 'progress-mid';
  return 'progress-low';
}

function getBadge(progress) {
  if (progress >= 100) return '<span class="badge badge-done">已完成</span>';
  if (progress > 0) return '<span class="badge badge-in-progress">进行中</span>';
  return '<span class="badge badge-not-started">未开始</span>';
}

function render() {
  const listEl = document.getElementById('taskList');
  const emptyEl = document.getElementById('emptyState');

  if (tasks.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
  } else {
    emptyEl.style.display = 'none';
    listEl.innerHTML = tasks.map(t => {
      const cls = getProgressClass(t.progress);
      const completed = t.progress >= 100 ? ' completed' : '';
      const timeStr = new Date(t.createdAt).toLocaleDateString('zh-CN', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      return `
        <div class="task-card${completed}">
          <div class="task-info">
            <div class="task-name">${escHtml(t.name)} ${getBadge(t.progress)}</div>
            <div class="task-meta">创建于 ${timeStr}</div>
          </div>
          <div class="progress-section">
            <div class="progress-header">
              <span style="font-size:0.8rem;color:var(--text-secondary);">进度</span>
              <span class="progress-percent">${t.progress}%</span>
            </div>
            <div class="progress-bar-track ${cls}">
              <div class="progress-bar-fill" style="width:${t.progress}%"></div>
            </div>
          </div>
          <div class="task-actions">
            <button class="btn-icon" title="编辑" onclick="openEditModal('${t.id}')">✎</button>
            <button class="btn-icon danger" title="删除" onclick="deleteTask('${t.id}')">🗑</button>
          </div>
        </div>
      `;
    }).join('');
  }

  updateStats();
  document.getElementById('taskCount').textContent = `共 ${tasks.length} 个任务`;
}

function updateStats() {
  const total = tasks.length;
  const done = tasks.filter(t => t.progress >= 100).length;
  const avg = total > 0 ? Math.round(tasks.reduce((s, t) => s + t.progress, 0) / total) : 0;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statAvg').textContent = avg + '%';
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== 弹窗逻辑 =====
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增任务';
  document.getElementById('modalTaskName').value = '';
  document.getElementById('modalTaskProgress').value = 0;
  document.getElementById('rangeValueDisplay').textContent = '0%';
  document.getElementById('modalOverlay').style.display = 'flex';
  document.getElementById('modalTaskName').focus();
}

function openEditModal(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑任务';
  document.getElementById('modalTaskName').value = task.name;
  document.getElementById('modalTaskProgress').value = task.progress;
  document.getElementById('rangeValueDisplay').textContent = task.progress + '%';
  document.getElementById('modalOverlay').style.display = 'flex';
  document.getElementById('modalTaskName').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function updateRangeValue() {
  document.getElementById('rangeValueDisplay').textContent =
    document.getElementById('modalTaskProgress').value + '%';
}

function saveTask() {
  const name = document.getElementById('modalTaskName').value.trim();
  const progress = parseInt(document.getElementById('modalTaskProgress').value);

  if (!name) {
    showToast('请输入任务名称');
    return;
  }

  if (editingId) {
    const task = tasks.find(t => t.id === editingId);
    if (task) {
      task.name = name;
      task.progress = progress;
    }
    showToast('任务已更新 ✓');
  } else {
    tasks.push({
      id: genId(),
      name,
      progress,
      createdAt: Date.now()
    });
    showToast('任务已创建 ✓');
  }

  saveTasks();
  closeModal();
  render();
}

function deleteTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  if (!confirm(`确定要删除任务「${task.name}」吗？此操作不可撤销。`)) return;
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
  showToast('任务已删除');
}

// ===== Toast =====
function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('removing');
    el.addEventListener('animationend', () => el.remove());
  }, 2200);
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    openAddModal();
  }
});

// ===== 初始化 =====
loadTasks();
render();
</script>

</body>
</html>
