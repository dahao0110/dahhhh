<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动态选股筛选器</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface-hover: #222635;
    --border: #2a2d3a; --text: #e1e4ed; --text-secondary: #8b8fa8;
    --accent: #6366f1; --accent-glow: rgba(99,102,241,0.3);
    --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
    --radius: 14px; --radius-sm: 8px; --transition: 0.25s ease;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(34,197,94,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 1340px; margin: 0 auto; padding: 32px 24px 60px; position: relative; z-index: 1; }

  /* header */
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e1e4ed, #a5a9c0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header .subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px; }

  /* filter cards */
  .filter-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .filter-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; transition: var(--transition); }
  .filter-card:hover { border-color: #3a3d50; }
  .filter-card .filter-label { font-size: 0.78rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
  .filter-card .filter-value { font-size: 1.05rem; font-weight: 700; color: var(--text); }
  .filter-card input[type="range"] { width: 100%; margin-top: 8px; -webkit-appearance: none; height: 6px; background: var(--border); border-radius: 3px; outline: none; }
  .filter-card input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 0 4px var(--accent-glow); }

  .industry-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .industry-tag { padding: 4px 12px; border-radius: 20px; font-size: 0.74rem; cursor: pointer; transition: var(--transition); font-weight: 500;
    border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-family: inherit; user-select: none; }
  .industry-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px var(--accent-glow); }
  .industry-tag:hover:not(.active) { border-color: #4a4d60; color: var(--text); }

  /* stats */
  .stats-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .stats-info { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat-item { font-size: 0.85rem; }
  .stat-item .num { font-weight: 700; font-size: 1.15rem; }
  .stat-item.matched .num { color: var(--green); }
  .stat-item.total .num { color: var(--accent); }
  .stat-item.rate .num { color: var(--orange); }
  .btn { padding: 9px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; border: none; cursor: pointer; transition: var(--transition); font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 12px var(--accent-glow); }
  .btn-primary:hover { background: #7577f5; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

  /* table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  thead th { padding: 12px 14px; text-align: left; font-weight: 600; color: var(--text-secondary); font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 1px solid var(--border); white-space: nowrap; position: sticky; top: 0; background: var(--surface); }
  tbody td { padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; }
  tbody tr { transition: var(--transition); }
  tbody tr:hover { background: var(--surface-hover); }
  tbody tr:last-child td { border-bottom: none; }
  .stock-code { font-weight: 600; color: var(--accent); }
  .stock-name { font-weight: 600; }
  .up { color: var(--red); }
  .down { color: var(--green); }
  .tag-sm { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin: 1px 2px; }
  .tag-limit-up { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag-growth { background: rgba(34,197,94,0.12); color: var(--green); }
  .tag-industry { background: rgba(99,102,241,0.12); color: #818cf8; }
  .tag-warn { background: rgba(245,158,11,0.12); color: #f59e0b; }
  .tag-fail { background: rgba(239,68,68,0.1); color: #ef4444; }

  /* states */
  .loading-wrap { text-align: center; padding: 60px 20px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.4; }

  /* notice banner */
  .notice { margin-bottom: 16px; padding: 12px 18px; border-radius: var(--radius-sm); font-size: 0.82rem; display: flex; align-items: center; gap: 10px; }
  .notice-warn { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); color: #fbbf24; }
  .notice-success { background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.15); color: #4ade80; }
  .notice-error { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15); color: #f87171; }

  /* rules */
  .rules-note { margin-top: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; }
  .rules-note h3 { font-size: 0.88rem; margin-bottom: 10px; color: var(--text-secondary); }
  .rules-note .rule-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 6px; }
  .rules-note .rule-item { font-size: 0.8rem; color: var(--text-secondary); padding: 7px 10px; border-radius: 6px; background: rgba(255,255,255,0.02); display: flex; align-items: center; gap: 8px; }
  .rules-note .rule-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 0.68rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  @media (max-width: 768px) { .container { padding: 16px 10px 40px; } .header h1 { font-size: 1.3rem; } .filter-panel { grid-template-columns: 1fr; } .stats-bar { flex-direction: column; align-items: flex-start; } }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <h1>📊 动态选股筛选器</h1>
    <p class="subtitle">基于十五五规划方向 · A股智能筛选</p>
  </header>

  <!-- 状态提示条 -->
  <div class="notice notice-warn" id="dataSourceNotice" style="display:none;">
    <span id="dataSourceIcon">⏳</span>
    <span id="dataSourceMsg">正在加载...</span>
  </div>

  <!-- 筛选面板 -->
  <div class="filter-panel">
    <div class="filter-card">
      <div class="filter-label">💰 总市值上限（亿元）</div>
      <div class="filter-value" id="capDisplay">≤ 1000 亿</div>
      <input type="range" id="capSlider" min="10" max="2000" value="1000" step="10" oninput="updateCap(this.value)">
    </div>
    <div class="filter-card">
      <div class="filter-label">📈 最低年营收增速</div>
      <div class="filter-value" id="growthDisplay">≥ 10%</div>
      <input type="range" id="growthSlider" min="0" max="50" value="10" step="1" oninput="updateGrowth(this.value)">
    </div>
    <div class="filter-card">
      <div class="filter-label">📅 近 N 个交易日有涨停</div>
      <div class="filter-value" id="limitUpDisplay">近 10 日 ≥ 1 次</div>
      <input type="range" id="limitUpDays" min="5" max="30" value="10" step="1" oninput="updateLimitUp(this.value)">
    </div>
    <div class="filter-card" style="grid-column: 1 / -1;">
      <div class="filter-label">🏭 十五五规划热点行业（可多选，至少保留1个）</div>
      <div class="industry-tags" id="industryTags"></div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stats-info">
      <div class="stat-item total">数据池 <span class="num" id="statTotal">--</span> 只</div>
      <div class="stat-item matched">符合条件 <span class="num" id="statMatch">--</span> 只</div>
      <div class="stat-item rate">命中率 <span class="num" id="statRate">--</span></div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="resetFilters()">↺ 重置条件</button>
      <button class="btn btn-primary" onclick="loadLiveData()">🔄 加载实时数据</button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th>代码</th><th>名称</th><th>最新价</th><th>涨跌幅</th><th>市值(亿)</th><th>PE</th><th>所属行业</th><th>十五五板块</th><th>近N日涨停</th><th>3年营收增速</th><th>规则匹配</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="rules-note">
    <h3>📋 当前筛选规则</h3>
    <div class="rule-list">
      <div class="rule-item"><span class="rule-num">1</span>总市值 &lt; 1000 亿元（可调）</div>
      <div class="rule-item"><span class="rule-num">2</span>连续3年营收增速 &gt; 10%（可调）</div>
      <div class="rule-item"><span class="rule-num">3</span>属于十五五规划热点行业（可选）</div>
      <div class="rule-item"><span class="rule-num">4</span>近N个交易日 ≥ 1次涨停（可调）</div>
    </div>
  </div>
</div>

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
let allStocks = [];
let filteredStocks = [];
let activeIndustries = new Set(Object.keys(HOT_INDUSTRIES));
let currentFilters = { maxCap: 1000, minGrowth: 10, limitUpDays: 10 };
let dataSource = 'embedded'; // 'embedded' | 'live'
let stockLimitUpCache = {}; // {code: [dateStrings]} from real API

function matchIndustry(industryName) {
  if (!industryName) return [];
  const matched = [];
  for (const [category, keywords] of Object.entries(HOT_INDUSTRIES)) {
    for (const kw of keywords) {
      if (industryName.includes(kw)) {
        matched.push(category);
        break;
      }
    }
  }
  return matched;
}

function revGrowthOk(rev3y, minG) {
  if (!rev3y || rev3y.length < 3) return null; // null = unknown
  return rev3y.every(r => r >= minG);
}

function hasRecentLimitUp(limitUpDays, lookbackDays) {
  if (!limitUpDays || limitUpDays.length === 0) return false;
  // limitUpDays 是日期字符串数组，判断最近 N 个自然日内是否有
  const now = new Date();
  const cutoff = new Date(now.getTime() - lookbackDays * 24 * 3600 * 1000);
  return limitUpDays.some(d => new Date(d + 'T15:00:00') >= cutoff);
}

// ═══════════════════════════════════════════
// Apply filters
// ═══════════════════════════════════════════
function applyFilters() {
  const { maxCap, minGrowth, limitUpDays } = currentFilters;

  filteredStocks = allStocks.filter(s => {
    // Rule 1: market cap
    if (s.marketCap > maxCap) return false;

    // Rule 3: industry (at least one matching active tag)
    const hasIndustry = s.industries.some(ind => activeIndustries.has(ind));
    if (!hasIndustry && activeIndustries.size > 0) return false;

    // Rule 4: limit-up in N days
    if (!hasRecentLimitUp(s.limitUpDays, limitUpDays)) return false;

    // Rule 2: revenue growth (null = unknown, still show but mark)
    const revCheck = revGrowthOk(s.rev3y, minGrowth);
    if (revCheck === false) return false; // explicitly fails

    return true;
  });

  // Sort: stocks WITH all rules passed first, then by market cap
  filteredStocks.sort((a, b) => {
    const aAll = revGrowthOk(a.rev3y, minGrowth) === true;
    const bAll = revGrowthOk(b.rev3y, minGrowth) === true;
    if (aAll && !bAll) return -1;
    if (!aAll && bAll) return 1;
    return a.marketCap - b.marketCap;
  });

  updateStats();
  renderTable();
}

// ═══════════════════════════════════════════
// Render
// ═══════════════════════════════════════════
function renderTable() {
  const tbody = document.getElementById('tableBody');
  const stocks = filteredStocks;
  const { minGrowth, limitUpDays } = currentFilters;

  if (stocks.length === 0) {
    tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state"><div class="icon">🔍</div><p>没有完全符合条件的股票</p><p style="font-size:0.82rem;margin-top:4px;">试试：调大市值上限 / 减少行业 / 增加涨停天数 / 降低营收增速要求</p></div></td></tr>`;
    return;
  }

  const display = stocks.slice(0, 100);
  tbody.innerHTML = display.map(s => {
    const chgClass = s.pctChg > 0 ? 'up' : (s.pctChg < 0 ? 'down' : '');
    const chgStr = s.pctChg != null ? (s.pctChg > 0 ? '+' : '') + s.pctChg.toFixed(2) + '%' : '--';
    const peStr = s.pe != null ? (s.pe > 0 ? s.pe.toFixed(0) : '亏损') : '--';

    // Rule badges
    const rules = [];
    rules.push(s.marketCap <= currentFilters.maxCap
      ? '<span class="tag-sm tag-industry">✓市值</span>'
      : '<span class="tag-sm tag-fail">✗市值</span>');

    const hasInd = s.industries.some(ind => activeIndustries.has(ind));
    rules.push(hasInd
      ? '<span class="tag-sm tag-industry">✓行业</span>'
      : '<span class="tag-sm tag-fail">✗行业</span>');

    const revOK = revGrowthOk(s.rev3y, minGrowth);
    if (revOK === true) {
      rules.push('<span class="tag-sm tag-growth">✓营收增速</span>');
    } else if (revOK === false) {
      rules.push(`<span class="tag-sm tag-fail">✗营收增速</span>`);
    } else {
      rules.push('<span class="tag-sm tag-warn">📋营收待查</span>');
    }

    const hasLU = hasRecentLimitUp(s.limitUpDays, limitUpDays);
    rules.push(hasLU
      ? '<span class="tag-sm tag-limit-up">✓涨停</span>'
      : '<span class="tag-sm tag-fail">✗涨停</span>');

    const luDaysStr = s.limitUpDays && s.limitUpDays.length > 0
      ? s.limitUpDays.map(d => d.slice(5)).join(' / ')
      : '无';

    const revStr = s.rev3y ? s.rev3y.map(r => r + '%').join(' → ') : '待查';

    return `<tr>
      <td><span class="stock-code">${s.code}</span></td>
      <td><span class="stock-name">${s.name}</span></td>
      <td>${s.price.toFixed(2)}</td>
      <td class="${chgClass}">${chgStr}</td>
      <td>${s.marketCap.toFixed(0)}</td>
      <td>${peStr}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;" title="${s.industry}">${s.industry}</td>
      <td>${s.industries.join(' · ')}</td>
      <td>${luDaysStr}</td>
      <td>${revStr}</td>
      <td>${rules.join('')}</td>
    </tr>`;
  }).join('');

  if (stocks.length > 100) {
    tbody.innerHTML += `<tr><td colspan="11" style="text-align:center;color:var(--text-secondary);padding:14px;">仅显示前 100 条，共 ${stocks.length} 条</td></tr>`;
  }
}

function updateStats() {
  document.getElementById('statTotal').textContent = allStocks.length;
  document.getElementById('statMatch').textContent = filteredStocks.length;
  document.getElementById('statRate').textContent =
    allStocks.length > 0 ? (filteredStocks.length / allStocks.length * 100).toFixed(1) + '%' : '--';
}

// ═══════════════════════════════════════════
// Live API — JSONP 方式（绕过 file:// CORS 限制）
// 减少请求字段 + 仅拉取收盘数据可用的字段来提速
// ═══════════════════════════════════════════

// JSONP 工具：动态注入 <script> 标签加载跨域数据
function jsonp(url, timeoutMs = 15000) {
  return new Promise((resolve, reject) => {
    const callbackName = '_jsonp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    const fullUrl = url.replace(/([?&])cb=[^&]*/, '$1cb=' + callbackName);

    const script = document.createElement('script');
    script.src = fullUrl;

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP 超时'));
    }, timeoutMs);

    function cleanup() {
      clearTimeout(timer);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.onerror = () => {
      cleanup();
      reject(new Error('JSONP 请求失败'));
    };

    document.head.appendChild(script);
  });
}

function loadLiveData() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = `<tr><td colspan="11"><div class="loading-wrap"><div class="spinner"></div><span style="color:var(--text-secondary);">正在通过 JSONP 加载今日收盘数据...</span></div></td></tr>`;

  const notice = document.getElementById('dataSourceNotice');
  notice.style.display = 'flex';
  notice.className = 'notice notice-warn';
  document.getElementById('dataSourceIcon').textContent = '⏳';
  document.getElementById('dataSourceMsg').textContent = '正在从东方财富获取今日行情（JSONP方式绕过CORS）...';

  // Step 1: JSONP 获取股票列表（精简字段，加快加载）
  loadStockListJSONP().then(raw => {
    if (raw.length === 0) throw new Error('API 返回空数据');

    // 只保留关键字段，缩小数据量
    allStocks = [];
    for (const s of raw) {
      const cap = (s.f20 || 0) / 1e8;
      if (cap <= 0 || cap >= 5000) continue; // 跳过市值异常或超大的
      const industry = s.f100 || s.f124 || '';
      allStocks.push({
        code: s.f12,
        name: s.f14,
        price: s.f2,
        pctChg: s.f3,
        marketCap: cap,
        pe: s.f9 || null,
        industry: industry,
        industries: matchIndustry(industry),
        limitUpDays: [],   // 后续异步填充
        rev3y: null,
      });
    }

    dataSource = 'live';
    notice.className = 'notice notice-success';
    document.getElementById('dataSourceIcon').textContent = '✅';
    document.getElementById('dataSourceMsg').textContent =
      `行情加载成功！共 ${allStocks.length} 只A股。涨停数据用内嵌缓存，点击可刷新。`;

    applyFilters();

    // Step 2: 仅对前 15 只筛选结果做 K 线 JSONP 检查（控制请求量）
    checkLimitUpsJSONP(filteredStocks.slice(0, 15)).then(() => {
      applyFilters(); // 重新过滤，把没涨停的去掉
      document.getElementById('dataSourceMsg').textContent =
        `行情加载成功！共 ${allStocks.length} 只A股，已检查前15只涨停。`;
    });

  }).catch(e => {
    console.error('JSONP 加载失败:', e);
    notice.className = 'notice notice-error';
    document.getElementById('dataSourceIcon').textContent = '❌';
    document.getElementById('dataSourceMsg').textContent =
      `实时加载失败（${e.message}），使用内嵌数据。可尝试用 http-server 启动本地服务后刷新。`;
    if (allStocks.length === 0) initEmbeddedData();
  });
}

// JSONP 方式获取股票列表（只请求必要字段，减少响应体积）
function loadStockListJSONP() {
  // 只请求行情+市值+行业相关字段，不要 f4/f5/f6/f7/f15/f16/f17/f18/f21 等冗余字段
  const fields = 'f2,f3,f9,f12,f13,f14,f20,f100,f124';
  const markets = [
    'm:0+t:6,m:0+t:80',   // 深证A股 + 上证A股
    'm:1+t:2,m:1+t:23',   // 北证A股（分两次，避免单次过大）
  ];

  const promises = markets.map(fs => {
    const url = 'https://push2.eastmoney.com/api/qt/clist/get?' +
      'pn=1&pz=5000&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281' +
      '&fltt=2&invt=2&fid=f3' +
      `&fs=${encodeURIComponent(fs)}` +
      `&fields=${fields}` +
      '&cb=cb'; // 占位，jsonp() 会替换
    return jsonp(url);
  });

  return Promise.all(promises).then(results => {
    const all = [];
    for (const r of results) {
      if (r?.data?.diff) all.push(...r.data.diff);
    }
    return all;
  });
}

// JSONP 方式检查单只股票 K 线（带缓存避免重复请求）
const _klineCache = {};
function checkOneStockKLineJSONP(code, market, days) {
  const cacheKey = `${code}_${days}`;
  if (_klineCache[cacheKey] !== undefined) {
    return Promise.resolve(_klineCache[cacheKey]);
  }

  const secid = `${market}.${code}`;
  const url = 'https://push2his.eastmoney.com/api/qt/stock/kline/get?' +
    'secid=' + secid +
    '&ut=fa5fd1943c7b386f172d6893dbfba10b' +
    '&fields1=f1,f2,f3,f4,f5,f6' +
    '&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61' +
    '&klt=101&fqt=1&end=20500101' +
    `&lmt=${days}` +
    '&cb=cb';

  return jsonp(url, 8000).then(data => {
    const klines = data?.data?.klines || [];
    let hasLU = false;
    const luDates = [];
    for (const line of klines) {
      const parts = line.split(',');
      const pctChg = parseFloat(parts[8]);
      if (pctChg >= 9.5) {
        hasLU = true;
        luDates.push(parts[0]); // 日期
      }
    }
    const result = { hasLU, luDates };
    _klineCache[cacheKey] = result;
    return result;
  }).catch(() => {
    const result = { hasLU: false, luDates: [] };
    _klineCache[cacheKey] = result;
    return result;
  });
}

// 分批 JSONP 检查涨停（每次 3 只并发，避免浏览器限流）
async function checkLimitUpsJSONP(stocks) {
  const batchSize = 3;
  let checked = 0;
  for (let i = 0; i < stocks.length; i += batchSize) {
    const batch = stocks.slice(i, i + batchSize);
    const results = await Promise.all(
      batch.map(s => checkOneStockKLineJSONP(s.code, s.market || '0', currentFilters.limitUpDays + 1))
    );
    batch.forEach((stock, idx) => {
      stock.limitUpDays = results[idx].luDates;
    });
    checked += batch.length;
    document.getElementById('dataSourceMsg').textContent =
      `行情已加载。涨停检查中... ${checked}/${stocks.length}`;
  }
}

// ═══════════════════════════════════════════
// UI
// ═══════════════════════════════════════════
function updateCap(val) {
  currentFilters.maxCap = parseInt(val);
  document.getElementById('capDisplay').textContent = `≤ ${val} 亿`;
  applyFilters();
}
function updateGrowth(val) {
  currentFilters.minGrowth = parseInt(val);
  document.getElementById('growthDisplay').textContent = `≥ ${val}%`;
  applyFilters();
}
function updateLimitUp(val) {
  currentFilters.limitUpDays = parseInt(val);
  document.getElementById('limitUpDisplay').textContent = `近 ${val} 日 ≥ 1 次`;
  applyFilters();
}
function resetFilters() {
  currentFilters = { maxCap: 1000, minGrowth: 10, limitUpDays: 10 };
  activeIndustries = new Set(Object.keys(HOT_INDUSTRIES));
  document.getElementById('capSlider').value = 1000;
  document.getElementById('growthSlider').value = 10;
  document.getElementById('limitUpDays').value = 10;
  updateCap(1000); updateGrowth(10); updateLimitUp(10);
  renderIndustryTags();
}
function renderIndustryTags() {
  document.getElementById('industryTags').innerHTML = Object.keys(HOT_INDUSTRIES).map(ind =>
    `<span class="industry-tag${activeIndustries.has(ind) ? ' active' : ''}" onclick="toggleIndustry('${ind}')">${ind}</span>`
  ).join('');
}
function toggleIndustry(ind) {
  if (activeIndustries.has(ind)) {
    if (activeIndustries.size > 1) activeIndustries.delete(ind);
  } else {
    activeIndustries.add(ind);
  }
  renderIndustryTags();
  applyFilters();
}

// ═══════════════════════════════════════════
// Startup
// ═══════════════════════════════════════════
renderIndustryTags();
initEmbeddedData();
</script>
